<!DOCTYPE html>
<html>
<head>
  <title>App Thuê Số OTP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial; text-align: center; margin: 20px; background-color: #f4f4f4; }
    .btn {
      display: block; width: 100%; padding: 15px; margin: 10px 0;
      background-color: #0088cc; color: white; border: none;
      border-radius: 8px; font-size: 16px; font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Chọn Dịch Vụ Cần Thuê</h2>
  
  <button class="btn" onclick="sendToBot('681')">🎲 Thuê Cm88 (2.500đ)</button>
  <button class="btn" onclick="sendToBot('682')">🎰 Thuê sc88 (2.500đ)</button>
  <button class="btn" onclick="sendToBot('683')">🎯 Thuê f168 (2.500đ)</button>
  <button class="btn" onclick="sendToBot('676')">💎 Thuê OK9 (2.500đ)</button>

  <script>
    // Khởi tạo Telegram Web App
    let tg = window.Telegram.WebApp;
    tg.expand(); // Mở full màn hình

    // Hàm gửi dữ liệu về con Bot Python
    function sendToBot(service_id) {
      tg.sendData(service_id); 
      tg.close();
    }
  </script>
</body>
</html>
